<!--
YouTube Cinema Focus - Popup UI
This is the small popup that appears when you click the extension icon.
-->

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>YouTube Focus Mode</title>

    <!-- Link optional CSS (inline for simplicity) -->
    <style>
        body {
            width: 200px;
            height: 100px;
            margin: 0;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #222;
            /* Dark popup background */
            color: #fff;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
            background-color: #e62117;
            /* YouTube red */
            color: white;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #c51b14;
        }
    </style>
</head>

<body>

    <!-- Toggle button -->
    <button id="toggleButton">Loading...</button>

    <!-- Include JS for popup -->
    <script src="popup.js"></script>

</body>

</html>
