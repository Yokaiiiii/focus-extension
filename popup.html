<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Cinema Focus</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 260px;
            background: #0f0f0f;
            color: #fff;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            user-select: none;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 18px;
        }

        .icon {
            font-size: 22px;
            line-height: 1;
        }

        .title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.02em;
        }

        .subtitle {
            font-size: 11px;
            color: #666;
            margin-top: 2px;
        }

        .divider {
            height: 1px;
            background: #222;
            margin-bottom: 18px;
        }

        .toggle-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .toggle-label {
            font-size: 13px;
            color: #ccc;
        }

        .toggle-status {
            font-size: 11px;
            color: #555;
            margin-top: 3px;
        }

        /* Toggle switch */
        .switch {
            position: relative;
            width: 42px;
            height: 24px;
            flex-shrink: 0;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            background: #333;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .slider::before {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            left: 3px;
            top: 3px;
            background: #666;
            border-radius: 50%;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        input:checked+.slider {
            background: #cc0000;
        }

        input:checked+.slider::before {
            transform: translateX(18px);
            background: #fff;
        }

        .hint {
            margin-top: 16px;
            font-size: 10.5px;
            color: #444;
            line-height: 1.5;
        }

        .hint span {
            color: #666;
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="icon">🎬</div>
        <div>
            <div class="title">Cinema Focus</div>
            <div class="subtitle">YouTube Theater Mode</div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="toggle-row">
        <div>
            <div class="toggle-label">Focus Mode</div>
            <div class="toggle-status" id="status-text">Disabled</div>
        </div>
        <label class="switch">
            <input type="checkbox" id="toggle" />
            <span class="slider"></span>
        </label>
    </div>

    <div class="hint">
        When enabled, switching to <span>Theater Mode</span> on YouTube will hide all distractions automatically.
    </div>

    <script src="popup.js"></script>
</body>

</html>
